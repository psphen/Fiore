<div class="bg-white rounded-2xl p-5 shadow-sm flex flex-col gap-4">
  <h3 class="text-base font-semibold text-gray-800">Categorias en tendencia</h3>

  <!-- Donut chart -->
  <div class="relative flex justify-center items-center h-44">
    <canvas #donutCanvas class="absolute inset-0 w-full h-full"></canvas>
    <div class="relative z-10 text-center pointer-events-none mt-6">
      <p class="text-[10px] font-semibold text-gray-400 tracking-widest uppercase">Total de ventas</p>
      <p class="text-3xl font-bold text-gray-800">{{ total }}</p>
    </div>
  </div>

  <!-- Legend -->
  <div class="space-y-2">
    @for (cat of categories; track cat.label) {
      <div class="flex items-center justify-between text-sm">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-sm inline-block shrink-0" [style.background-color]="cat.color"></span>
          <span class="text-gray-700">{{ cat.label }}</span>
        </div>
        <span class="font-medium text-gray-800">{{ cat.percent }}</span>
      </div>
    }
  </div>

  <button class="mt-2 w-full text-sm text-pink-600 font-medium border border-pink-200 rounded-full py-2 hover:bg-pink-50 transition-colors">
    Ver detalles →
  </button>
</div>
